name: Build WhatsApp Auto Answer APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Seteaza Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instaleaza Android SDK
        uses: android-actions/setup-android@v3

      - name: Compileaza APK
        working-directory: WhatsAppAutoAnswer
        run: |
          gradle assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.useAndroidX=true

      - name: Incarca APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppAutoAnswer-APK
          path: WhatsAppAutoAnswer/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
