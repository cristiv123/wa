name: Build WhatsApp Auto Answer APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: WhatsAppAutoAnswer
        run: |
          gradle wrapper --gradle-version=8.6
          ./gradlew :app:assembleDebug --no-daemon 2>&1 | tee /tmp/build.log
          grep -E "^.*error:.*|FAILURE|BUILD SUCCESSFUL" /tmp/build.log | grep -v "cache\|Caching" | tail -20

      - name: Upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: /tmp/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: APK
          path: WhatsAppAutoAnswer/app/build/outputs/apk/debug/
