name: Build WhatsApp Auto Answer APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: WhatsAppAutoAnswer
        run: |
          gradle wrapper --gradle-version=8.6
          ./gradlew :app:assembleDebug --no-daemon
          echo "=== Cauta APK ==="
          find . -name "*.apk" 2>/dev/null
          find /home/runner -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppAutoAnswer-APK
          path: "**/*.apk"
          if-no-files-found: error
