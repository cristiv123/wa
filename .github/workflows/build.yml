name: Build WhatsApp Auto Answer APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Seteaza Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instaleaza Android SDK
        uses: android-actions/setup-android@v3

      - name: Compileaza APK
        working-directory: WhatsAppAutoAnswer
        run: |
          gradle :app:assembleDebug --no-daemon --stacktrace > /tmp/build.log 2>&1 || true
          echo "=== ERORI JAVA ==="
          grep -E "error:|Error|FAILED|Exception" /tmp/build.log | head -50
          echo "=== SFARSIT LOG ==="
          tail -30 /tmp/build.log

      - name: Upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: /tmp/build.log

      - name: Verifica APK
        run: |
          if [ -f WhatsAppAutoAnswer/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "SUCCESS APK creat!"
          else
            echo "FAIL APK negasit"
            exit 1
          fi

      - name: Incarca APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: WhatsAppAutoAnswer-APK
          path: WhatsAppAutoAnswer/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
