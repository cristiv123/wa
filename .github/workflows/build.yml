name: Build WhatsApp Auto Answer APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Seteaza Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Seteaza Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Compileaza APK Debug
        run: |
          cd WhatsAppAutoAnswer
          gradle assembleDebug

      - name: Incarca APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppAutoAnswer-APK
          path: WhatsAppAutoAnswer/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
